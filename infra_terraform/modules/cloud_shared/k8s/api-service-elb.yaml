# Classic ELB track: fru-api-svc with in-tree cloud provider → Classic ELB (legacy).
# Used when deploying kube WITH --elb. kube_apply selects this manifest.
# Mutually exclusive with api-service.yaml: deploy uses exactly one.
# See docs/learned/cloud_shared/KUBE_LB.md.
apiVersion: v1
kind: Service
metadata:
  name: fru-api-svc
  namespace: fru-kube
  # internet-facing: CloudFront must reach API from internet.
  # No aws-load-balancer-type → in-tree cloud provider reconciles → Classic ELB.
  # For NLB instead, use api-service.yaml (default, when no --elb flag is used).
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  selector:
    app: fru-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5001
  type: LoadBalancer
