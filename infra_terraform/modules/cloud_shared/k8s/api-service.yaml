# NLB track: fru-api-svc with AWS Load Balancer Controller → Network Load Balancer.
# Used when deploying kube WITHOUT --elb. kube_apply selects this manifest.
# Mutually exclusive with api-service-elb.yaml: deploy uses exactly one.
# See docs/learned/cloud_shared/KUBE_LB.md.
apiVersion: v1
kind: Service
metadata:
  name: fru-api-svc
  namespace: fru-kube
  # internet-facing: CloudFront must reach API from internet; default LB is internal.
  # aws-load-balancer-type: external → hands Service to AWS Load Balancer Controller → NLB.
  # Without it, in-tree would create Classic ELB (see api-service-elb.yaml).
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: instance
spec:
  selector:
    app: fru-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5001
  type: LoadBalancer
