# Periodic Spark analytics job. Reads from Delta (S3), writes to batch_analytics (PostgreSQL).
# Requires aws-credentials secret (created at bootstrap) for S3 access; EKS pods lack instance metadata.
# Shares batch_analytics with nonkube EventBridge Spark task. See docs/learned/cloud_shared/ANALYTICS_AND_DATA.md.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fru-analytics-periodic-kube
  namespace: fru-kube
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: spark
            image: ${SPARK_IMAGE}
            command: ["/opt/spark/bin/spark-submit", "--conf", "spark.driver.extraJavaOptions=-Duser.home=/tmp", "--conf", "spark.executor.extraJavaOptions=-Duser.home=/tmp", "--packages", "io.delta:delta-spark_2.12:3.1.0,org.apache.hadoop:hadoop-aws:3.3.4", "/opt/fru/jobs/periodic.py"]
            env:
            - name: SPARK_EXTRA_CONF
              value: "spark.fru.delta_root=${DELTA_ROOT}"
            - name: DELTA_TABLE_PATH
              value: "${DELTA_TABLE_PATH}"
            - name: PGHOST
              value: "${PGHOST}"
            - name: PGPORT
              value: "${PGPORT}"
            - name: PGDATABASE
              value: "${PGDATABASE}"
            - name: PGUSER
              value: "${PGUSER}"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: PGPASSWORD
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: CLOUD_REGION
              value: "${CLOUD_REGION}"
          restartPolicy: OnFailure
