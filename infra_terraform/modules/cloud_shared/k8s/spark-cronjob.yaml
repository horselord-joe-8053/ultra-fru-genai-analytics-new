apiVersion: batch/v1
kind: CronJob
metadata:
  name: fru-analytics-periodic-kube
  namespace: fru-kube
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: spark
            image: ${SPARK_IMAGE}
            command: ["/opt/spark/bin/spark-submit", "--conf", "spark.driver.extraJavaOptions=-Duser.home=/tmp", "--conf", "spark.executor.extraJavaOptions=-Duser.home=/tmp", "--packages", "io.delta:delta-spark_2.12:3.1.0,org.apache.hadoop:hadoop-aws:3.3.4", "/opt/fru/jobs/periodic.py"]
            env:
            - name: SPARK_EXTRA_CONF
              value: "spark.fru.delta_root=${DELTA_ROOT}"
            - name: DELTA_TABLE_PATH
              value: "${DELTA_TABLE_PATH}"
            - name: PGHOST
              value: "${PGHOST}"
            - name: PGPORT
              value: "${PGPORT}"
            - name: PGDATABASE
              value: "${PGDATABASE}"
            - name: PGUSER
              value: "${PGUSER}"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: PGPASSWORD
          restartPolicy: OnFailure
