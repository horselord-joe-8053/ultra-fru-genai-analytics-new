# GKE LoadBalancer for fru-api. No AWS annotations; GKE creates external LB by default.
# Used for GCP kube scope. Mutually exclusive with api-service.yaml (AWS).
apiVersion: v1
kind: Service
metadata:
  name: fru-api-svc
  namespace: fru-kube
spec:
  selector:
    app: fru-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5001
  type: LoadBalancer
