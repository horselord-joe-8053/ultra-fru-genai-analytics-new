# GCP kube: one-off Spark analytics bootstrap. Uses gs:// and GCS connector (ADC).
# Populates batch_analytics (shared with nonkube). No AWS credentials.
apiVersion: batch/v1
kind: Job
metadata:
  name: fru-analytics-bootstrap-kube
  namespace: fru-kube
spec:
  template:
    spec:
      containers:
      - name: spark
        image: ${SPARK_IMAGE}
        command: ["/opt/spark/bin/spark-submit", "--packages", "io.delta:delta-spark_2.12:3.1.0", "--jars", "/opt/fru/jars/gcs-connector-hadoop3-2.2.7-shaded.jar", "/opt/fru/jobs/run_analytics.py"]
        env:
        - name: SPARK_EXTRA_CONF
          value: "spark.fru.delta_root=${DELTA_ROOT}"
        - name: DELTA_TABLE_PATH
          value: "${DELTA_TABLE_PATH}"
        - name: PGHOST
          value: "${PGHOST}"
        - name: PGPORT
          value: "${PGPORT}"
        - name: PGDATABASE
          value: "${PGDATABASE}"
        - name: PGUSER
          value: "${PGUSER}"
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: PGPASSWORD
        - name: CLOUD_PROVIDER
          value: "gcp"
        - name: CLOUD_REGION
          value: "${CLOUD_REGION}"
      restartPolicy: Never
  backoffLimit: 4
