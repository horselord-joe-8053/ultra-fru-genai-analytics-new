# =============================================================================
# AWS Deploy Config: Scope-Based, Bounded, Single Source of Truth
# =============================================================================
#
# PURPOSE:
#   Single source of truth for AWS region/zone, compute, and database config.
#   Hierarchy: scope (scope_default | kube | nonkube) → region (regional_default | us-east-1 | ...)
#
# HOW IT WORKS:
#   - scope_default: Network + database for durable stack (VPC, Aurora).
#   - kube: EKS compute (min/max node count, instance types).
#   - nonkube: ECS compute (min/max instance count, task cpu/memory).
#   - regional_default: Shared values; region blocks override only what differs.
#
# =============================================================================

scope_default:
  regional_default:
    network:
      public_subnet_cidrs: ["10.0.1.0/24", "10.0.2.0/24"]
      private_subnet_cidrs: ["10.0.101.0/24", "10.0.102.0/24"]
    database:
      multi_az: false

  us-east-1:
    network:
      azs: [us-east-1a, us-east-1b]
  us-east-2:
    network:
      azs: [us-east-2a, us-east-2b]
  us-west-2:
    network:
      azs: [us-west-2a, us-west-2b]

kube:
  # min=2: Fix CronJob resource exhaustion. 1× t3.small (2GB) overloaded by Spark+fru-api+LB
  # → memory pressure → node unreachable. 2 nodes spread load. See EKS_NODE_KUBELET_CRONJOB.md
  regional_default:
    compute:
      min_node_count: 2
      max_node_count: 2
      node_instance_types: [t3.small]
  us-east-1:
    compute:
      min_node_count: 2
      max_node_count: 2
  us-east-2:
    compute:
      min_node_count: 2
      max_node_count: 2

nonkube:
  regional_default:
    compute:
      min_instance_count: 1
      max_instance_count: 2
      tasks:
        api:
          cpu: 512
          memory: 1024
        spark:
          cpu: 512
          memory: 1024
