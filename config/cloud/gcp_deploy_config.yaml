# =============================================================================
# GCP Deploy Config: Scope-Based, Bounded, Single Source of Truth
# =============================================================================
#
# PURPOSE:
#   Single source of truth for GCP region/zone, compute, and database config.
#   Hierarchy: scope (scope_default | kube | nonkube) → region (regional_default | us-central1 | ...)
#
# HOW IT WORKS:
#   - scope_default: Network + database for durable stack.
#   - kube: GKE compute (min/max node count, machine_type, zone).
#   - nonkube: Cloud Run compute (min/max instance count, task cpu/memory).
#   - regional_default: Shared values; region blocks override only what differs.
#
# =============================================================================

scope_default:
  regional_default:
    database:
      high_availability: false
  us-central1:
    network:
      zones: [us-central1-a]
  us-east1:
    network:
      zones: [us-east1-b]

kube:
  regional_default:
    compute:
      location_type: zonal
      min_node_count: 1
      max_node_count: 2
      machine_type: e2-small
  us-central1:
    compute:
      zone: us-central1-a
  us-east1:
    compute:
      zone: us-east1-b

nonkube:
  regional_default:
    compute:
      min_instance_count: 1
      max_instance_count: 2
      tasks:
        api:
          cpu: "1"
          memory: "512Mi"
        spark:
          cpu: "2"
          memory: "4Gi"
