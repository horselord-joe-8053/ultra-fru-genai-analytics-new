# Manual integration tests against a local API (Docker). Not run on every PR.
# On the runner, start the stack yourself or use a self-hosted runner with deploy already up.
name: Integration tests (manual)

on:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run integration tests (skip if API unreachable)
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "0"
          INTEGRATION_API_BASE_URL: ${{ vars.INTEGRATION_API_BASE_URL || 'http://localhost:5001' }}
        run: |
          python -m pytest tests/integration -m integration -v --tb=short
      - name: Note
        if: always()
        run: |
          echo "If all tests skipped, start Docker locally and run:"
          echo "  python orchestrator.py deploy --provider local --scope all"
          echo "Or set repo variable INTEGRATION_API_BASE_URL to a reachable API."
