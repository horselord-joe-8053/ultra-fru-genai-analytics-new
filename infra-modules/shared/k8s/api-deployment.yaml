apiVersion: apps/v1
kind: Deployment
metadata:
  name: fru-api
  namespace: fru-kube
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fru-api
  template:
    metadata:
      labels:
        app: fru-api
    spec:
      containers:
      - name: api
        image: ${APP_IMAGE}
        ports:
        - containerPort: 5001
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 5
        env:
        - name: PGHOST
          value: "fru-db"
        - name: LOG_LEVEL
          value: "INFO"
        - name: ALLOWED_ORIGINS
          value: "*"
        - name: PGUSER
          value: "postgres"
        - name: PGDATABASE
          value: "fru_db"
        - name: PGPASSWORD
          value: "postgres" # Placeholder
        - name: OPENAI_EMBED_MODEL
          value: "text-embedding-3-small"
        - name: USE_AGENT_QUERY
          value: "true"
        - name: OPENAI_API_KEY
          value: "sk-placeholder"
        - name: AWS_REGION
          value: "us-east-1"
        - name: CONTAINER_IMAGE
          value: "${APP_IMAGE}"
