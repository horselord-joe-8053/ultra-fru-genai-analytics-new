apiVersion: v1
kind: Service
metadata:
  name: fru-api-svc
  namespace: fru-kube
  # CloudFront must reach the API origin from the internet; default NLB is internal in private subnets.
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  selector:
    app: fru-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5001
  type: LoadBalancer
