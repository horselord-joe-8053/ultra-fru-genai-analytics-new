# Local development: PostgreSQL with pgvector.
# Usage: docker compose -f tools/local/docker/docker-compose.local.yml -p fru_local up -d
# Teardown: docker compose -f tools/local/docker/docker-compose.local.yml -p fru_local down
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fru-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
      POSTGRES_DB: ${PGDATABASE:-fru_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${PGDATABASE:-fru_db}"]
      interval: 2s
      timeout: 5s
      retries: 10
